name: Update World Cup Results

on:
  schedule:
    - cron: '30 23,0,6,14,16,18,20 * * *'
  workflow_dispatch:

jobs:
  update-results:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Fetch latest results
        run: node scripts/fetch-results.js

      - name: Commit and push if changed
        run: |
          git config user.name "worldcup-bot"
          git config user.email "bot@worldcup-dashboard"
          git add src/data/groups.json src/data/fixtures.json
          git diff --staged --quiet || git commit -m "🤖 Update results $(date -u '+%Y-%m-%d')"
          git push --force
