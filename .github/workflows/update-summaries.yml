name: Update Match Summaries

on:
  schedule:
    - cron: '0 2,8,10,12,14,18,20,22 * * *'  # cada 6h durante el torneo
  workflow_dispatch:

jobs:
  update-summaries:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Fetch summaries from YouTube
        env:
          YOUTUBE_API_KEY: AIzaSyAr0DbW_5sUaRlC4aicwRDQBYuc-mKIaZk
        run: node scripts/fetch-summaries.js

      - name: Commit if changed
        run: |
          git config user.name "summaries-bot"
          git config user.email "bot@worldcup-dashboard"
          git add src/data/fixtures.json
          git diff --staged --quiet || git commit -m "🎬 Update match summaries $(date -u '+%Y-%m-%d %H:%M')"
          git push --force
