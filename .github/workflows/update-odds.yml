name: Update Odds

on:
  schedule:
    - cron: '0 8,20 * * *'  # 10:00 y 22:00 hora España
  workflow_dispatch:

jobs:
  update-odds:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
      - name: Fetch odds
        env:
          ODDS_API_KEY: 41411fc3ab527a17f79fc3bf8a8c8d47
        run: node scripts/fetch-odds.js

      - name: Commit and push if changed
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "worldcup-bot"
          git config user.email "bot@worldcup-dashboard"
          git add src/data/groups.json
          git commit -m "🤖 Update results $(date -u '+%Y-%m-%d')"
          git pull --rebase origin main
          git push
